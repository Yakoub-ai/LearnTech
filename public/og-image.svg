<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='630' viewBox='0 0 1200 630'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#0f0f1a'/>
      <stop offset='100%' stop-color='#1a1a2e'/>
    </linearGradient>
    <linearGradient id='accent' x1='0' y1='0' x2='1' y2='0'>
      <stop offset='0%' stop-color='#6366f1'/>
      <stop offset='100%' stop-color='#06b6d4'/>
    </linearGradient>
    <filter id='glow'>
      <feGaussianBlur stdDeviation='8' result='blur'/>
      <feMerge><feMergeNode in='blur'/><feMergeNode in='SourceGraphic'/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width='1200' height='630' fill='url(#bg)'/>

  <!-- Subtle grid pattern -->
  <pattern id='grid' width='60' height='60' patternUnits='userSpaceOnUse'>
    <path d='M 60 0 L 0 0 0 60' fill='none' stroke='rgba(255,255,255,0.03)' stroke-width='1'/>
  </pattern>
  <rect width='1200' height='630' fill='url(#grid)'/>

  <!-- Accent glow circles -->
  <circle cx='950' cy='150' r='200' fill='#6366f1' opacity='0.07'/>
  <circle cx='250' cy='500' r='150' fill='#06b6d4' opacity='0.06'/>

  <!-- Logo icon (bar chart) -->
  <rect x='80' y='200' width='18' height='60' rx='3' fill='url(#accent)' opacity='0.9'/>
  <rect x='106' y='180' width='18' height='80' rx='3' fill='url(#accent)' opacity='0.9'/>
  <rect x='132' y='220' width='18' height='40' rx='3' fill='url(#accent)' opacity='0.9'/>

  <!-- Brand name -->
  <text x='80' y='320' font-family='system-ui, -apple-system, sans-serif' font-size='64' font-weight='700' fill='white' letter-spacing='-1'>Tech Hubben</text>
  <text x='80' y='390' font-family='system-ui, -apple-system, sans-serif' font-size='64' font-weight='300' fill='url(#accent)' letter-spacing='-1'>Learning</text>

  <!-- Tagline -->
  <text x='80' y='460' font-family='system-ui, -apple-system, sans-serif' font-size='26' font-weight='400' fill='rgba(255,255,255,0.55)'>Structured roadmaps for every tech role &#x2022; Beginner to Senior</text>

  <!-- Bottom accent bar -->
  <rect x='80' y='530' width='200' height='4' rx='2' fill='url(#accent)'/>

  <!-- Role tags -->
  <rect x='80' y='555' width='110' height='32' rx='6' fill='rgba(99,102,241,0.2)' stroke='rgba(99,102,241,0.4)' stroke-width='1'/>
  <text x='135' y='576' font-family='system-ui, sans-serif' font-size='14' fill='rgba(255,255,255,0.7)' text-anchor='middle'>AI Engineer</text>

  <rect x='204' y='555' width='130' height='32' rx='6' fill='rgba(6,182,212,0.2)' stroke='rgba(6,182,212,0.4)' stroke-width='1'/>
  <text x='269' y='576' font-family='system-ui, sans-serif' font-size='14' fill='rgba(255,255,255,0.7)' text-anchor='middle'>Data Engineer</text>

  <rect x='348' y='555' width='130' height='32' rx='6' fill='rgba(99,102,241,0.2)' stroke='rgba(99,102,241,0.4)' stroke-width='1'/>
  <text x='413' y='576' font-family='system-ui, sans-serif' font-size='14' fill='rgba(255,255,255,0.7)' text-anchor='middle'>ML Engineer</text>

  <rect x='492' y='555' width='120' height='32' rx='6' fill='rgba(6,182,212,0.2)' stroke='rgba(6,182,212,0.4)' stroke-width='1'/>
  <text x='552' y='576' font-family='system-ui, sans-serif' font-size='14' fill='rgba(255,255,255,0.7)' text-anchor='middle'>DevOps</text>
</svg>